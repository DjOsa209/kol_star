  <circle cx="710" cy="161" r="19" fill="#e0e7ff"/>
  <path d="M703 160a7 7 0 1 0 14 0a7 7 0 1 0-14 0M697 180c2-10 24-10 26 0" fill="none" stroke="#4f46e5" stroke-width="2"/>
