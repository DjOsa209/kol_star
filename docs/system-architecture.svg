<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#4f46e5"/>
    </marker>
    <style>
      .title { font: 700 34px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #64748b; }
      .group-title { font: 700 20px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #1e293b; }
      .box-title { font: 700 17px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #0f172a; }
      .box-text { font: 400 14px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #475569; }
      .edge-text { font: 500 13px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #475569; }
      .badge { font: 600 12px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #ffffff; }
      .group { stroke-width: 2; rx: 22; }
      .box { fill: #ffffff; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .edge { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .edge-blue { fill: none; stroke: #4f46e5; stroke-width: 2.5; marker-end: url(#arrowBlue); }
      .edge-dash { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg)"/>
  <text x="70" y="65" class="title">KOL Admin 当前系统架构</text>
